<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro di me stesso - Yoga e Sociale</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        :root {
            --primary-color: #3b6b4c; /* Verde scuro ispirato all'albero */
            --secondary-color: #d15b8f; /* Rosa/viola ispirato ai fiori */
            --accent-color: #fdfaf2; /* Sfondo crema caldo e rilassante */
            --text-color: #2b2d42;
            --white: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--accent-color);
        }

        header {
            background-color: var(--white);
            text-align: center;
            padding: 2rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        header h1 {
            color: #245266; /* Blu petrolio come la scritta nel disegno */
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-color);
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Stile per l'illustrazione principale */
        .hero-image-container {
            max-width: 700px;
            margin: 1.5rem auto 0 auto;
            padding: 0 1rem;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: block;
        }

        nav {
            background-color: var(--white);
            display: flex;
            justify-content: center;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 1.5rem;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--secondary-color);
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        section {
            background: var(--white);
            padding: 3rem;
            margin-bottom: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: var(--secondary-color);
            margin: 0.5rem auto 0 auto;
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8rem;
            }
            section {
                padding: 1.5rem;
            }
        }

        .card {
            background-color: var(--accent-color);
            padding: 2rem;
            border-radius: 8px;
            border-top: 4px solid var(--primary-color);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .contact-info {
            text-align: center;
            font-size: 1.1rem;
        }

        .contact-info a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: bold;
        }

        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Maestro di me stesso</h1>
        <p>Percorsi di crescita, consapevolezza ed evoluzione sociale per l'infanzia e l'adolescenza</p>
        
        <div class="hero-image-container">
            <img src="sito.jpg" alt="Illustrazione Maestro di me stesso" class="hero-image">
        </div>
    </header>
