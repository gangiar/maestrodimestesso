<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro di me stesso - Yoga e Sociale</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        :root {
            --primary-color: #3b6b4c; /* Verde scuro ispirato all'albero */
            --secondary-color: #d15b8f; /* Rosa/viola ispirato ai fiori */
            --accent-bg: rgba(253, 250, 242, 0.85); /* Sfondo crema semi-transparente per le schede */
            --text-color: #2b2d42;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: var(--text-color);
            
            /* Sfondo aggiornato con estensione .jpeg */
            background-image: linear-gradient(to bottom, rgba(253, 250, 242, 0.8), rgba(253, 250, 242, 0.92)), url('sito.jpeg');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        header {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 4rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        header h1 {
            color: #245266; /* Blu petrolio come la scritta nel disegno */
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.3rem;
            color: var(--text-color);
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto;
            font-style: italic;
        }

        nav {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            padding: 1.2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 1.5rem;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            transition: var(--transition);
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--secondary-color);
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--secondary-color);
        }

        nav a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 1100px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }

        section {
            background: rgba(255, 255, 255, 0.92); /* Sfondo bianco semi-trasparente */
            backdrop-filter: blur(10px);
            padding: 3.5rem;
            margin-bottom: 3rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 2rem;
            font-weight: 600;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: var(--secondary-color);
            margin: 0.6rem auto 0 auto;
            border-radius: 2px;
        }

        .vision-text {
            text-align: center;
            max-width: 850px;
            margin: 0 auto 2.5rem auto;
            font-size: 1.15rem;
            color: #4a4e69;
        }

        /* Box in evidenza per la tua frase */
        .quote-box {
            background-color: rgba(59, 107, 76, 0.06);
            border-left: 5px solid var(--primary-color);
            border-right: 5px solid var(--secondary-color);
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            max-width: 850px;
            margin: 0 auto;
        }

        .quote-box p {
            font-style: italic;
            font-size: 1.35rem;
            color: #1e3f20;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        .card {
            background-color: rgba(253, 250, 242, 0.7);
            padding: 2.5rem;
            border-radius: 12px;
            border-top: 5px solid var(--primary-color);
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card:hover {
            transform: translateY(-5px);
            background-color: rgba(253, 250, 242, 0.9);
            box-shadow: 0 12px 25px rgba(0,0,0,0.04);
        }

        .card h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card p {
            color: #4a4e69;
            font-size: 1.05rem;
        }

        .contact-info {
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }

        .contact-info p {
            font-size: 1.15rem;
            margin-bottom: 1.5rem;
            color: #4a4e69;
        }

        .contact-buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: var(--transition);
            font-size: 1.05rem;
        }

        .btn-email {
            background-color: var(--secondary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(209, 91, 143, 0.3);
        }

        .btn-email:hover {
            background-color: #bd487c;
            transform: translateY(-2px);
        }

        .btn-web {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 107, 76, 0.3);
        }

        .btn-web:hover {
            background-color: #2e543b;
            transform: translateY(-2px);
        }

        footer {
            background-color: rgba(36, 82, 102, 0.95);
            backdrop-filter: blur(5px);
            color: white;
            text-align: center;
            padding: 2.5rem;
            margin-top: 8rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            header h1 {
                font-size: 2.2rem;
            }
            header p {
                font-size: 1.1rem;
            }
            section {
                padding: 2rem 1.5rem;
            }
            .quote-box p {
                font-size: 1.15rem;
            }
            nav a {
                margin: 0 0.8rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Maestro di me stesso</h1>
        <p>Percorsi di crescita, consapevolezza ed evoluzione sociale per l'infanzia e l'adolescenza</p>
