<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro di me stesso - Yoga e Sociale</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        :root {
            --primary-color: #3b6b4c; /* Verde scuro ispirato all'albero */
            --secondary-color: #d15b8f; /* Rosa/viola ispirato ai fiori */
            --accent-bg: #fdfaf2; /* Sfondo crema caldo e rilassante */
            --text-color: #2b2d42;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: var(--text-color);
            background-color: var(--accent-bg);
        }

        header {
            background-color: var(--white);
            text-align: center;
            padding: 3rem 1rem 2rem 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        header h1 {
            color: #245266; /* Blu petrolio come la scritta nel disegno */
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-color);
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto 2rem auto;
            font-style: italic;
        }

        /* Stile per l'illustrazione principale */
        .hero-image-container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: block;
            transition: var(--transition);
        }
        
        .hero-image:hover {
            transform: scale(1.01);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        nav {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            padding: 1.2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 1.5rem;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            transition: var(--transition);
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--secondary-color);
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--secondary-color);
        }

        nav a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        section {
            background: var(--white);
            padding: 3.5rem;
            margin-bottom: 3rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 2rem;
            font-weight: 600;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: var(--secondary-color);
            margin: 0.6rem auto 0 auto;
            border-radius: 2px;
        }

        .vision-text {
            text-align: center;
            max-width: 850px;
            margin: 0 auto 2.5rem auto;
            font-size: 1.15rem;
            color: #4a4e69;
        }
